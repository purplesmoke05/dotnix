name: Update Packages

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update-codex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        uses: cachix/install-nix-action@6004951b182f8860210c8d6f0d808ec5b1a33d28
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run update script
        run: |
          echo "Running codex update script..."
          cd pkgs/codex
          chmod +x ./update.sh
          ./update.sh
          echo "Update script finished."

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(codex): Update to latest rust tag"
          title: "chore(codex): Update to latest rust tag"
          body: |
            Automated update of the Codex CLI package definition to the latest rust tag.
            Regenerated `pkgs/codex/default.nix` with refreshed release hashes.
          branch: "chore/update-codex"
          delete-branch: true
          labels: automated pr, nix, package update
